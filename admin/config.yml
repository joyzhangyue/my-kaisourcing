backend:
  name: github
  repo: 你的用户名/你的仓库名   # 改成你的 GitHub 仓库
  branch: main
  base_url: https://kaisource-oauth.yourusername.workers.dev  # 稍后部署 Worker 后替换

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "homepage"
    label: "首页内容"
    folder: "."
    create: false
    delete: false
    editor:
      preview: true
    files:
      - label: "Hero 区域"
        name: "hero"
        file: "index.html"
        fields:
          - { label: "大标题 (加粗部分)", name: "hero_title_bold", widget: "string", default: "Make It Easy to" }
          - { label: "大标题 (高亮部分)", name: "hero_title_highlight", widget: "string", default: "Source from China" }
          - { label: "副标题", name: "hero_subtitle", widget: "text", default: "I handle the entire process..." }
          - { label: "公司名称", name: "company_name", widget: "string", default: "KaiSource" }
      - label: "联系人信息"
        name: "contact"
        file: "index.html"
        fields:
          - { label: "邮箱", name: "email", widget: "string", default: "kai@kaisource.com" }
          - { label: "电话/WhatsApp", name: "phone", widget: "string", default: "+86 123 4567 890" }
          - { label: "地址", name: "location", widget: "string", default: "Nanshan District, Shenzhen, China" }

  - name: "pages"
    label: "页面"
    create: false
    delete: false
    files:
      - label: "关于我们"
        name: "about"
        file: "about.html"
        fields:
          - { label: "页面标题", name: "title", widget: "string" }
          - { label: "主要内容", name: "body", widget: "html" }
      - label: "服务"
        name: "services"
        file: "services.html"
        fields:
          - { label: "页面标题", name: "title", widget: "string" }
          - { label: "主要内容", name: "body", widget: "html" }

  - name: "blog"
    label: "博客"
    folder: "blog/"
    create: true
    delete: true
    path: "{{slug}}"
    media_folder: ""
    public_folder: ""
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "正文", name: "body", widget: "markdown" }
